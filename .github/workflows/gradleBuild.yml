name: Java CI with Gradle

on:
  pull_request:
    branches: ["main"]
    paths:
      - "lib/**"
      - "cli/**"
      - "server/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "buildSrc/**"
      - ".github/workflows/gradleBuild.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Determine affected Kotlin projects
        id: affected
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          changed_lib=false
          changed_cli=false
          changed_server=false
          changed_shared=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              lib/*) changed_lib=true ;;
              cli/*) changed_cli=true ;;
              server/*) changed_server=true ;;
              .github/workflows/gradleBuild.yml|build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat|gradle/*|buildSrc/*)
                changed_shared=true
                ;;
            esac
          done < <(git diff --name-only "$base_sha" "$head_sha")

          run_lib="$changed_lib"
          run_cli="$changed_cli"
          run_server="$changed_server"

          if [[ "$changed_shared" == "true" ]]; then
            run_lib=true
            run_cli=true
            run_server=true
          fi

          if [[ "$changed_lib" == "true" ]]; then
            run_cli=true
            run_server=true
          fi

          tasks=()
          if [[ "$run_lib" == "true" ]]; then
            tasks+=(":lib:core:build" ":lib:model:build" ":lib:adapter:build")
          fi
          if [[ "$run_cli" == "true" ]]; then
            tasks+=(":cli:build")
          fi
          if [[ "$run_server" == "true" ]]; then
            tasks+=(":server:build")
          fi

          echo "kotlin_tasks=${tasks[*]}" >> "$GITHUB_OUTPUT"

          {
            echo "### Affected Kotlin Projects"
            echo "- \`lib\`: $run_lib"
            echo "- \`cli\`: $run_cli"
            echo "- \`server\`: $run_server"
            echo ""
            echo "Gradle tasks: \`${tasks[*]}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Execute affected Gradle builds and tests
        if: steps.affected.outputs.kotlin_tasks != ''
        run: ./gradlew ${{ steps.affected.outputs.kotlin_tasks }}

      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
        with:
          paths: "**/test-results/**/TEST-*.xml"
        if: always()
