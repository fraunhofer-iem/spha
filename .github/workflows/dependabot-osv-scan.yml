name: Dependabot OSV Scan

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scan:
    if: github.actor == 'dependabot[bot]'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2
    with:
      fail-on-vuln: true
      upload-sarif: false
