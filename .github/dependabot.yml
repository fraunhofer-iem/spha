# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      minor-patch-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Block Kotlin 2.4.10: CodeQL's Kotlin extractor rejects it (supports < 2.4.10).
      # 2.4.10 is the only 2.4.1x release (Kotlin goes 2.4.0 -> 2.4.10 -> 2.4.20), so an
      # exact match covers the line while leaving 2.4.20+ open for Dependabot to propose.
      # TODO(security): move to Kotlin 2.4.20 when released. See github/codeql#21938
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: ["2.4.10"]
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions: ["2.4.10"]
      - dependency-name: "org.jetbrains.kotlin.plugin.serialization"
        versions: ["2.4.10"]

  - package-ecosystem: "docker" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      minor-patch-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/ui" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      minor-patch-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/metrics" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      minor-patch-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      minor-patch-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
